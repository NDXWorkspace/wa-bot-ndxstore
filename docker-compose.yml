services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-bot-ndxstore
    ports:
      - "3000:3000"
    volumes:
      - ./wa-session:/app/wa-session
      - .wwebjs_cache:/app/.wwebjs_cache
      - ./.notified.json:/app/.notified.json
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    stop_grace_period: 30s
    init: true
    mem_limit: 768m
    memswap_limit: 1024m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
